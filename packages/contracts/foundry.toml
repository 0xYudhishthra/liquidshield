[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 1000
via_ir = false
ffi = false
fs_permissions = [{ access = "read", path = "./"}]

auto_detect_remappings = false

remappings = [
    "forge-std/=lib/forge-std/src/",
    "v4-core/=lib/uniswap-hooks/lib/v4-core/",
    "v4-periphery/=lib/uniswap-hooks/lib/v4-periphery/",
    "@uniswap/v4-core/=lib/uniswap-hooks/lib/v4-core/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/uniswap-hooks/=lib/uniswap-hooks/",
    "reactive-lib/=lib/reactive-lib/",
]

[rpc_endpoints]
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"
ethereum_sepolia = "${ETHEREUM_SEPOLIA_RPC_URL}"
reactive_lasna = "${REACTIVE_LASNA_RPC_URL}"

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}" }
ethereum_sepolia = { key = "${ETHERSCAN_API_KEY}" }
